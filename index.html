<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViralGIFs PRO++</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body{font-family:Arial;background:#0f0f0f;color:#fff;margin:0}
    header{display:flex;justify-content:space-between;padding:10px;background:#000}
    input,button{padding:6px;border-radius:8px;border:none}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:10px}
    .card{background:#1a1a1a;border-radius:10px;overflow:hidden;position:relative}
    img{width:100%}
    .like{position:absolute;bottom:5px;left:5px;background:#ff4081;color:#fff;padding:4px 6px;border-radius:6px;font-size:12px}
  </style>
</head>
<body><header>
  <h3>🔥🤪🫪🔥 ViralGIFs PRO++</h3>
  <div>
    <input id="email" placeholder="email">
    <input id="senha" type="password" placeholder="senha">
    <button onclick="login()">Entrar</button>
<button onclick="register()">Cadastrar</button>

  </div>
</header><div style="padding:10px">
  <input type="file" id="upload">
</div><div class="grid" id="grid"></div><script>
const supabaseClient = supabase.createClient(
  "https://owsiorfhmiotbdjzfipa.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93c2lvcmZobWlvdGJkanpmaXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzOTk2NzQsImV4cCI6MjA5MTk3NTY3NH0.s_U9TlFC5jSWsP-9nEQybqKm0WGoWaxhwT6uloUA2e8"
);

let user = null;
// CADASTRO
async function register(){
  let email = document.getElementById('email').value;
  let senha = document.getElementById('senha').value;

  let { error } = await supabaseClient.auth.signUp({
    email: email,
    password: senha
  });

  if(error) alert(error.message);
  else alert('Conta criada com sucesso!');
}
// LOGIN
async function login(){
  let email = document.getElementById('email').value;
  let senha = document.getElementById('senha').value;

  let { data, error } = await supabaseClient.auth.signInWithPassword({
  email: email,
  password: senha
});

  if(error) return alert('Erro login');

  user = data.user;
  alert('Logado!');
}

// UPLOAD

document.getElementById('upload').addEventListener('change', async (e)=>{
  if(!user) return alert('Faça login');

  let file = e.target.files[0];
  let nome = Date.now()+file.name;

  await supabaseClient.storage.from('gifs').upload(nome, file);

 let url = `https://owsiorfhmiotbdjzfipa.supabase.co/storage/v1/object/public/gifs/${nome}`;

  await supabaseClient.from('gifs').insert([
    { url: url, user_id: user.id, likes: 0 }
  ]);

  loadGifs();
});

// LIKE
async function like(id, current){
  await supabaseClient.from('gifs').update({ likes: current + 1 }).eq('id', id);
  loadGifs();
}

// LOAD
async function loadGifs(){
  let { data } = await supabaseClient
    .from('gifs')
    .select('*')
    .order('likes', { ascending:false });

  let grid = document.getElementById('grid');
  grid.innerHTML='';

  data.forEach(g=>{
    let div = document.createElement('div');
    div.className='card';

    div.innerHTML=`
      <img src="${g.url}">
      <div class="like" onclick="like(${g.id}, ${g.likes})">❤️ ${g.likes}</div>
    `;

    grid.appendChild(div);
  });
}

loadGifs();
</script></body>
</html>
